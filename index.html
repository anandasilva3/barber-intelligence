<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>Jackeline Barbeira - Agendamento</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <img class="logo" src="assets/logo-jackeline.png" alt="Logo Jackeline Barbeira">
      <div>
        <p class="brand-small">Jackeline Barbeira</p>
        <h1>Agende seu horário</h1>
        <p>Escolha serviço, barbeiro e o melhor horário disponível.</p>
      </div>
    </div>
  </header>

  <main>
    <div id="ok" class="alert success"></div>
    <div id="erro" class="alert error"></div>

    <section class="card">
      <h2>Seu agendamento</h2>

      <div class="row">
        <div>
          <label>Nome</label>
          <input id="nome" placeholder="Seu nome">
        </div>
        <div>
          <label>WhatsApp</label>
          <input id="whatsapp" placeholder="(99) 99999-9999">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Serviço</label>
          <select id="servico"></select>
        </div>
        <div>
          <label>Barbeiro</label>
          <select id="barbeiro"></select>
        </div>
      </div>

      <label>Data</label>
      <input id="data" type="date">

      <label>Horários disponíveis</label>
      <div id="horarios" class="hours">
        <div class="empty">Carregando horários...</div>
      </div>

      <label>Observação</label>
      <textarea id="obs" placeholder="Ex.: preferência de corte"></textarea>

      <button class="primary" id="confirmar" disabled>Escolha um horário</button>
      <p class="tiny">Os horários são calculados pelos espaços livres reais da agenda.</p>
    </section>

    <footer>
      <p>💈 Jackeline Barbeira • Agendamento online</p>
    </footer>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/interface.js"></script>
</body>
</html>
