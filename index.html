<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackeline Barbeira - Agendamento</title>
<style>
:root {
  --bg:#070707;
  --card:#171717;
  --text:#fff7e8;
  --muted:#b8ae9f;
  --gold:#c99a4a;
  --line:#333;
  --ok:#39b26f;
  --okbg:#123422;
  --danger:#e05a47;
  --dangerbg:#3b1713;
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body {
  font-family: Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at top,#242424,#070707 65%);
  color: var(--text);
}
.header {
  background:#060606;
  border-bottom:1px solid var(--line);
  padding:24px 16px;
}
.header-content {
  max-width:900px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:16px;
}
.logo {
  width:88px;
  height:88px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--gold);
  background:#111;
}
.brand {
  margin:0 0 4px;
  color:var(--muted);
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
}
h1 {
  margin:0;
  color:var(--gold);
  font-size:28px;
}
.subtitle {
  margin:6px 0 0;
  color:var(--muted);
  font-size:14px;
}
main {
  max-width:900px;
  margin:0 auto;
  padding:16px;
}
.card {
  background:rgba(23,23,23,.98);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
}
h2 {
  margin:0 0 14px;
  font-size:21px;
}
.row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
label {
  display:block;
  margin:12px 0 6px;
  color:var(--muted);
  font-size:13px;
  font-weight:bold;
}
input, select, textarea {
  width:100%;
  min-height:46px;
  padding:13px;
  border-radius:12px;
  border:1px solid #3a3a3a;
  background:#0d0d0d;
  color:var(--text);
  font-size:15px;
  outline:none;
}
textarea {
  min-height:76px;
  resize:vertical;
}
.hours {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}
.hour {
  border:1px solid var(--line);
  background:#111;
  color:var(--text);
  border-radius:12px;
  padding:12px 8px;
  min-height:45px;
  font-weight:bold;
  cursor:pointer;
}
.hour:hover, .hour.selected {
  background:var(--gold);
  color:#111;
  border-color:var(--gold);
}
.primary {
  width:100%;
  margin-top:14px;
  min-height:48px;
  border:0;
  border-radius:13px;
  background:var(--gold);
  color:#111;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}
.primary:disabled {
  opacity:.45;
  cursor:not-allowed;
}
.alert {
  display:none;
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
}
.success {
  background:var(--okbg);
  border:1px solid var(--ok);
  color:#eafff2;
}
.error {
  background:var(--dangerbg);
  border:1px solid var(--danger);
  color:#ffe9e6;
}
.empty {
  grid-column:1/-1;
  text-align:center;
  color:var(--muted);
  padding:18px;
  border:1px dashed #444;
  border-radius:16px;
}
.tiny, footer {
  color:var(--muted);
  font-size:12px;
  line-height:1.4;
}
footer {
  text-align:center;
  margin-top:18px;
  padding-bottom:16px;
}
@media(max-width:720px) {
  .header-content { align-items:center; }
  .logo { width:72px; height:72px; }
  h1 { font-size:22px; }
  .row { grid-template-columns:1fr; }
  .hours { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>

<script>
const API = "https://script.google.com/macros/s/AKfycbz7Y2dDbIY4CpVtP604JcSpGUajMzlUg9XpYs-bqPxvrzqsP0OEGJrMPT0yaG8ys_Q/exec";
const INICIO_EXPEDIENTE = "08:00";
const FIM_EXPEDIENTE = "18:00";
const PASSO_MINUTOS = 10;

let ag = [];
let barbeiros = [];
let servicos = [];
let bloqueios = [];

function hoje() {
  return new Date().toISOString().slice(0,10);
}

function esc(t) {
  return String(t == null ? "" : t)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function brl(v) {
  return Number(v || 0).toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}

function normalizaTexto(txt) {
  return String(txt || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .toLowerCase()
    .trim();
}

function campo(obj, nome) {
  if (!obj) return "";
  const alvo = normalizaTexto(nome);
  for (const chave in obj) {
    if (normalizaTexto(chave) === alvo) return obj[chave];
  }
  return "";
}

function parseDuracao(valor) {
  if (valor === null || valor === undefined || valor === "") return 30;
  const m = String(valor).replace(",", ".").match(/\d+(\.\d+)?/);
  return m ? Math.round(Number(m[0])) || 30 : 30;
}

function normalizarData(valor) {
  if (!valor) return "";
  const v = String(valor).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
  if (/^\d{2}\/\d{2}\/\d{4}/.test(v)) {
    const p = v.slice(0,10).split("/");
    return p[2] + "-" + p[1] + "-" + p[0];
  }
  const t = new Date(v);
  if (!isNaN(t.getTime())) {
    return t.getFullYear() + "-" + String(t.getMonth()+1).padStart(2,"0") + "-" + String(t.getDate()).padStart(2,"0");
  }
  return v;
}

function normalizarHorario(valor) {
  if (!valor) return "";
  const v = String(valor).trim();
  if (/^\d{2}:\d{2}/.test(v)) return v.slice(0,5);
  if (/^\d{1}:\d{2}/.test(v)) return "0" + v.slice(0,4);
  const t = new Date(v);
  if (!isNaN(t.getTime())) {
    return String(t.getHours()).padStart(2,"0") + ":" + String(t.getMinutes()).padStart(2,"0");
  }
  return v;
}

function min(h) {
  const p = normalizarHorario(h).split(":").map(Number);
  return p[0] * 60 + p[1];
}

function hhmm(total) {
  return String(Math.floor(total/60)).padStart(2,"0") + ":" + String(total%60).padStart(2,"0");
}

function statusOcupa(s) {
  s = normalizaTexto(s);
  return s !== "cancelado" && s !== "faltou";
}

function jsonp(acao) {
  return new Promise(function(resolve, reject) {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    window[cb] = function(dados) {
      delete window[cb];
      s.remove();
      resolve(dados);
    };
    s.onerror = function() {
      delete window[cb];
      s.remove();
      reject(new Error("Erro ao carregar API"));
    };
    s.src = API + "?acao=" + encodeURIComponent(acao) + "&callback=" + cb + "&t=" + Date.now();
    document.body.appendChild(s);
  });
}

async function post(payload) {
  await fetch(API, {
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload)
  });
}

function mapAg(a) {
  return {
    data: normalizarData(campo(a,"Data")),
    inicio: min(campo(a,"HorÃ¡rio") || campo(a,"Horario")),
    barbeiro: campo(a,"Barbeiro"),
    status: campo(a,"Status") || "Agendado",
    duracao: parseDuracao(campo(a,"DuraÃ§Ã£o") || campo(a,"Duracao") || 30)
  };
}

function mapBloq(b) {
  return {
    data: normalizarData(campo(b,"Data")),
    barbeiro: campo(b,"Barbeiro") || "Todos",
    inicio: min(campo(b,"InÃ­cio") || campo(b,"Inicio") || "00:00"),
    fim: min(campo(b,"Fim") || "23:59"),
    motivo: campo(b,"Motivo") || "HorÃ¡rio bloqueado"
  };
}

function fundirEventos(ev) {
  if (!ev.length) return [];
  const inicioDia = min(INICIO_EXPEDIENTE);
  const fimDia = min(FIM_EXPEDIENTE);
  const res = [{
    inicio: Math.max(ev[0].inicio, inicioDia),
    fim: Math.min(ev[0].fim, fimDia)
  }];

  for (let i = 1; i < ev.length; i++) {
    const atual = {
      inicio: Math.max(ev[i].inicio, inicioDia),
      fim: Math.min(ev[i].fim, fimDia)
    };
    const ultimo = res[res.length - 1];
    if (atual.inicio <= ultimo.fim) {
      ultimo.fim = Math.max(ultimo.fim, atual.fim);
    } else {
      res.push(atual);
    }
  }
  return res;
}

function eventosOcupados(dia, barb) {
  let ev = [];
  ag.forEach(function(a) {
    if (a.data === dia && a.barbeiro === barb && statusOcupa(a.status)) {
      ev.push({ inicio:a.inicio, fim:a.inicio + parseDuracao(a.duracao) });
    }
  });
  bloqueios.forEach(function(b) {
    if (b.data === dia && (normalizaTexto(b.barbeiro) === "todos" || b.barbeiro === barb)) {
      ev.push({ inicio:b.inicio, fim:b.fim });
    }
  });
  const inicioDia = min(INICIO_EXPEDIENTE);
  const fimDia = min(FIM_EXPEDIENTE);
  ev = ev.filter(function(e) {
    return e.fim > inicioDia && e.inicio < fimDia;
  });
  ev.sort(function(a,b) {
    return a.inicio - b.inicio;
  });
  return fundirEventos(ev);
}

function espacosLivres(dia, barb) {
  const inicioDia = min(INICIO_EXPEDIENTE);
  const fimDia = min(FIM_EXPEDIENTE);
  const ocupados = eventosOcupados(dia, barb);
  const livres = [];
  let cursor = inicioDia;

  ocupados.forEach(function(o) {
    if (cursor < o.inicio) {
      livres.push({inicio:cursor, fim:o.inicio});
    }
    cursor = Math.max(cursor, o.fim);
  });

  if (cursor < fimDia) {
    livres.push({inicio:cursor, fim:fimDia});
  }
  return livres;
}

function horariosDisponiveis(dia, barb, duracao) {
  const livres = espacosLivres(dia, barb);
  const horarios = [];
  livres.forEach(function(e) {
    for (let t = e.inicio; t + duracao <= e.fim; t += PASSO_MINUTOS) {
      horarios.push(hhmm(t));
    }
  });
  return horarios;
}

function horarioAindaLivre(dia, barb, inicio, duracao) {
  const fim = inicio + duracao;
  return espacosLivres(dia, barb).some(function(e) {
    return inicio >= e.inicio && fim <= e.fim;
  });
}

function msg(id, texto) {
  const el = document.getElementById(id);
  el.innerHTML = texto;
  el.style.display = "block";
  scrollTo({top:0, behavior:"smooth"});
}

function limparMsgs() {
  document.getElementById("ok").style.display = "none";
  document.getElementById("erro").style.display = "none";
}

function liberarBotao(sim) {
  const confirmar = document.getElementById("confirmar");
  confirmar.disabled = !sim;
  confirmar.textContent = sim ? "Confirmar agendamento" : "Escolha um horÃ¡rio";
}

async function carregar() {
  liberarBotao(false);
  document.getElementById("horarios").innerHTML = '<div class="empty">Carregando horÃ¡rios...</div>';
  try {
    const dados = await Promise.all([
      jsonp("listar"),
      jsonp("barbeiros"),
      jsonp("servicos"),
      jsonp("bloqueios")
    ]);

    ag = (dados[0] || []).filter(function(a) { return campo(a,"Cliente"); }).map(mapAg);
    barbeiros = dados[1] || [];
    servicos = dados[2] || [];
    bloqueios = (dados[3] || []).map(mapBloq);

    if (!barbeiros.length) barbeiros = ["Barbeiro 1"];
    if (!servicos.length) servicos = [{servico:"Corte", valor:35, duracao:30}];

    document.getElementById("barbeiro").innerHTML = barbeiros.map(function(b) {
      return "<option>" + esc(b) + "</option>";
    }).join("");

    document.getElementById("servico").innerHTML = servicos.map(function(s,i) {
      return '<option value="' + i + '">' + esc(s.servico) + ' â€” ' + brl(s.valor) + ' â€” ' + parseDuracao(s.duracao) + 'min</option>';
    }).join("");

    renderHorarios();
  } catch(e) {
    document.getElementById("horarios").innerHTML = '<div class="empty">NÃ£o consegui carregar os horÃ¡rios.<br>Atualize a pÃ¡gina.</div>';
    console.error(e);
  }
}

function renderHorarios() {
  liberarBotao(false);
  document.querySelectorAll(".hour").forEach(function(b) { b.classList.remove("selected"); });

  const dia = document.getElementById("data").value;
  const barb = document.getElementById("barbeiro").value;
  const s = servicos[Number(document.getElementById("servico").value)] || {duracao:30};

  if (!dia || !barb) {
    document.getElementById("horarios").innerHTML = '<div class="empty">Escolha data e barbeiro.</div>';
    return;
  }

  const livres = horariosDisponiveis(dia, barb, parseDuracao(s.duracao));

  if (!livres.length) {
    document.getElementById("horarios").innerHTML = '<div class="empty">Nenhum espaÃ§o livre para esse serviÃ§o.</div>';
    return;
  }

  document.getElementById("horarios").innerHTML = livres.map(function(h) {
    return '<button type="button" class="hour free" data-hora="' + h + '">' + h + '</button>';
  }).join("");
}

async function agendar() {
  limparMsgs();

  const s = servicos[Number(document.getElementById("servico").value)];
  const btn = document.querySelector(".hour.selected");

  if (!document.getElementById("nome").value.trim() ||
      !document.getElementById("whatsapp").value.trim() ||
      !s ||
      !document.getElementById("barbeiro").value ||
      !document.getElementById("data").value ||
      !btn) {
    msg("erro", "Preencha tudo e escolha um horÃ¡rio disponÃ­vel.");
    return;
  }

  const inicio = min(btn.dataset.hora);
  const dur = parseDuracao(s.duracao);
  const data = document.getElementById("data").value;
  const barbeiro = document.getElementById("barbeiro").value;

  if (!horarioAindaLivre(data, barbeiro, inicio, dur)) {
    msg("erro", "Esse horÃ¡rio nÃ£o estÃ¡ mais disponÃ­vel.");
    renderHorarios();
    return;
  }

  const payload = {
    data,
    horario: btn.dataset.hora,
    cliente: document.getElementById("nome").value.trim(),
    whatsapp: document.getElementById("whatsapp").value.trim(),
    servico: s.servico,
    barbeiro,
    valor: s.valor,
    duracao: dur,
    observacao: document.getElementById("obs").value.trim()
  };

  try {
    const confirmar = document.getElementById("confirmar");
    confirmar.disabled = true;
    confirmar.textContent = "Enviando...";
    await post(payload);

    msg("ok", "<strong>Agendamento enviado!</strong><br>" + esc(payload.cliente) + ", seu horÃ¡rio ficou para " + esc(payload.data.split("-").reverse().join("/")) + " Ã s " + esc(payload.horario) + ".");

    document.getElementById("nome").value = "";
    document.getElementById("whatsapp").value = "";
    document.getElementById("obs").value = "";
    setTimeout(carregar, 1200);
  } catch(e) {
    msg("erro", "NÃ£o consegui enviar.");
  } finally {
    liberarBotao(false);
  }
}

window.addEventListener("error", function(e) {
  const box = document.getElementById("erro");
  if (box) {
    box.innerHTML = "Erro ao carregar. Atualize a pÃ¡gina ou limpe o cache.";
    box.style.display = "block";
  }
  console.error(e.message);
});

document.addEventListener("click", function(e) {
  if (e.target.matches(".hour.free")) {
    document.querySelectorAll(".hour").forEach(function(b) { b.classList.remove("selected"); });
    e.target.classList.add("selected");
    liberarBotao(true);
  }
  if (e.target.id === "confirmar") {
    agendar();
  }
});

["data","barbeiro","servico"].forEach(function(id) {
  document.getElementById(id).addEventListener("change", renderHorarios);
});

document.getElementById("data").value = hoje();
carregar();
</script>
