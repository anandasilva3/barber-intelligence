<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache"><title>Agendar Horário V12</title><style>
:root{--card:#171717;--text:#fff7e8;--muted:#b8ae9f;--gold:#c99a4a;--line:#333;--ok:#39b26f;--okbg:#123422;--warn:#f2b742;--warnbg:#392d10;--danger:#e05a47;--dangerbg:#3b1713}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#060606,#181818);color:var(--text);overflow-x:hidden}
header{padding:22px 16px;background:#060606;border-bottom:1px solid var(--line)}header h1{margin:0;font-size:22px}header p{margin:6px 0 0;color:var(--muted);font-size:14px}
main{padding:14px;max-width:900px;margin:auto}.card{background:#171717;border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:13px}
h2{margin:0 0 12px;font-size:20px}h3{margin:0 0 6px;font-size:17px}label{display:block;margin:12px 0 6px;color:var(--muted);font-size:13px;font-weight:bold}
input,select,textarea{width:100%;padding:13px;border-radius:12px;border:1px solid #3a3a3a;background:#0e0e0e;color:var(--text);font-size:15px}textarea{min-height:70px;resize:vertical}
button{border:0;border-radius:13px;padding:12px 14px;min-height:45px;font-weight:bold;cursor:pointer}button:disabled{opacity:.45;cursor:not-allowed}
.primary{background:var(--gold);color:#111;width:100%;margin-top:14px}.secondary{background:#232323;color:var(--text)}.okbtn{background:var(--ok);color:#06180e}.warnbtn{background:var(--warn);color:#1d1300}.danger{background:var(--danger);color:white}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.tab{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:12px;font-weight:bold}.tab.active{background:var(--gold);color:#111}
section{display:none}section.active{display:block}.hours{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;width:100%}
.hour{border:1px solid var(--line);background:#111;color:var(--text);border-radius:12px;padding:12px 8px;text-align:center;width:100%}.hour.free{cursor:pointer}.hour.free:hover,.hour.selected{background:var(--gold);color:#111;border-color:var(--gold)}
.alert{display:none;padding:14px;border-radius:16px;margin-bottom:14px}.success{background:var(--okbg);border:1px solid var(--ok);color:#eafff2}.error{background:var(--dangerbg);border:1px solid var(--danger);color:#ffe9e6}
.empty{text-align:center;color:var(--muted);padding:18px;border:1px dashed #444;border-radius:16px;grid-column:1/-1}.tiny{color:var(--muted);font-size:12px;line-height:1.4;margin-top:10px}
.item{border:1px solid var(--line);background:#141414;border-radius:17px;padding:14px;margin:10px 0}.item.atendido{background:var(--okbg);border-color:var(--ok)}.item.faltou{background:var(--warnbg);border-color:var(--warn)}.item.cancelado{background:var(--dangerbg);border-color:var(--danger)}
.meta{color:var(--muted);font-size:13px;line-height:1.5}.item.atendido .meta,.item.faltou .meta,.item.cancelado .meta{color:#f5ead8}.badge{display:inline-block;background:#333;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:bold;margin-top:6px}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#141414;border:1px solid var(--line);border-radius:16px;padding:14px}.stat strong{display:block;color:var(--gold);font-size:22px;margin-top:5px}
.topbar{display:flex;gap:8px;align-items:center;justify-content:space-between}.topbar button{min-width:120px}
@media(max-width:720px){.row,.stats{grid-template-columns:1fr}.hours{grid-template-columns:repeat(2,1fr)}.actions{grid-template-columns:1fr}.tabs{grid-template-columns:1fr}header h1{font-size:20px}.topbar{display:block}.topbar button{width:100%;margin-top:8px}}
</style></head>
<body>
<header><h1>Agendar horário</h1><p>Horários gerados pelos espaços livres reais da agenda.</p></header>
<main>
<div id="ok" class="alert success"></div><div id="erro" class="alert error"></div>
<div class="card">
<h2>Seu agendamento</h2>
<div class="row"><div><label>Nome</label><input id="nome" placeholder="Seu nome"></div><div><label>WhatsApp</label><input id="whatsapp" placeholder="(99) 99999-9999"></div></div>
<div class="row"><div><label>Serviço</label><select id="servico"></select></div><div><label>Barbeiro</label><select id="barbeiro"></select></div></div>
<label>Data</label><input id="data" type="date">
<label>Horários disponíveis</label><div id="horarios" class="hours"><div class="empty">Carregando horários...</div></div>
<label>Observação</label><textarea id="obs" placeholder="Ex.: preferência de corte"></textarea>
<button class="primary" id="confirmar" disabled>Escolha um horário</button>
<p class="tiny">Exemplo: atendimento de 08:00 a 08:50 libera o próximo horário às 08:50.</p>
</div>
</main>
<script>

const API="https://script.google.com/macros/s/AKfycbznxE8rpdhWo-J6WdMtvabY9jVtD-V42g6Iu9iEDsrxXw_lLoH5lsSY0uRzWUiv69gu/exec";
function hoje(){return new Date().toISOString().slice(0,10)}
function esc(t){return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}
function brl(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function normalizaTexto(txt){return String(txt||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim()}
function campo(obj,nome){if(!obj)return "";var alvo=normalizaTexto(nome);for(var chave in obj){if(normalizaTexto(chave)===alvo)return obj[chave]}return ""}
function parseDuracao(valor){if(valor===null||valor===undefined||valor==="")return 30;var m=String(valor).replace(",",".").match(/\d+(\.\d+)?/);return m?Math.round(Number(m[0]))||30:30}
function normalizarData(valor){if(!valor)return "";var v=String(valor).trim();if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);if(/^\d{2}\/\d{2}\/\d{4}/.test(v)){var p=v.slice(0,10).split("/");return p[2]+"-"+p[1]+"-"+p[0]}var t=new Date(v);if(!isNaN(t.getTime()))return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");return v}
function normalizarHorario(valor){if(!valor)return "";var v=String(valor).trim();if(/^\d{2}:\d{2}/.test(v))return v.slice(0,5);if(/^\d{1}:\d{2}/.test(v))return "0"+v.slice(0,4);var t=new Date(v);if(!isNaN(t.getTime()))return String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0");return v}
function min(h){var p=normalizarHorario(h).split(":").map(Number);return p[0]*60+p[1]}
function hhmm(total){return String(Math.floor(total/60)).padStart(2,"0")+":"+String(total%60).padStart(2,"0")}
function sobrepoe(a1,a2,b1,b2){return a1<b2&&a2>b1}
function statusOcupa(s){s=normalizaTexto(s);return s!=="cancelado"&&s!=="faltou"}
function jsonp(acao){return new Promise(function(resolve,reject){var cb="cb_"+Date.now()+"_"+Math.random().toString(36).slice(2);var s=document.createElement("script");window[cb]=function(dados){delete window[cb];s.remove();resolve(dados)};s.onerror=function(){delete window[cb];s.remove();reject(new Error("Erro"))};s.src=API+"?acao="+encodeURIComponent(acao)+"&callback="+cb+"&t="+Date.now();document.body.appendChild(s)})}
async function post(payload){await fetch(API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})}

const INICIO_EXPEDIENTE="08:00";
const FIM_EXPEDIENTE="18:00";
let ag=[],barbeiros=[],servicos=[],bloqueios=[];

window.addEventListener("error",function(e){var box=document.getElementById("erro");if(box){box.innerHTML="Erro ao carregar. Atualize a página ou limpe o cache.";box.style.display="block"}console.error(e.message)});

function msg(id,texto){var el=document.getElementById(id);el.innerHTML=texto;el.style.display="block";scrollTo({top:0,behavior:"smooth"})}
function limparMsgs(){ok.style.display="none";erro.style.display="none"}
function liberarBotao(sim){confirmar.disabled=!sim;confirmar.textContent=sim?"Confirmar agendamento":"Escolha um horário"}

function mapAg(a){return {data:normalizarData(campo(a,"Data")),inicio:min(campo(a,"Horário")||campo(a,"Horario")),barbeiro:campo(a,"Barbeiro"),status:campo(a,"Status")||"Agendado",duracao:parseDuracao(campo(a,"Duração")||campo(a,"Duracao")||30)}}
function mapBloq(b){return {data:normalizarData(campo(b,"Data")),barbeiro:campo(b,"Barbeiro")||"Todos",inicio:min(campo(b,"Início")||campo(b,"Inicio")||"00:00"),fim:min(campo(b,"Fim")||"23:59"),motivo:campo(b,"Motivo")||"Horário bloqueado"}}

function eventosOcupados(dia,barb){
 var ev=[];
 ag.forEach(function(a){
   if(a.data===dia&&a.barbeiro===barb&&statusOcupa(a.status)){
     ev.push({inicio:a.inicio,fim:a.inicio+parseDuracao(a.duracao),tipo:"agendamento"});
   }
 });
 bloqueios.forEach(function(b){
   if(b.data===dia&&(normalizaTexto(b.barbeiro)==="todos"||b.barbeiro===barb)){
     ev.push({inicio:b.inicio,fim:b.fim,tipo:"bloqueio"});
   }
 });
 ev=ev.filter(function(e){return e.fim>min(INICIO_EXPEDIENTE)&&e.inicio<min(FIM_EXPEDIENTE)});
 ev.sort(function(a,b){return a.inicio-b.inicio});
 return fundirEventos(ev);
}

function fundirEventos(ev){
 if(!ev.length)return [];
 var res=[{inicio:Math.max(ev[0].inicio,min(INICIO_EXPEDIENTE)),fim:Math.min(ev[0].fim,min(FIM_EXPEDIENTE))}];
 for(var i=1;i<ev.length;i++){
   var atual={inicio:Math.max(ev[i].inicio,min(INICIO_EXPEDIENTE)),fim:Math.min(ev[i].fim,min(FIM_EXPEDIENTE))};
   var ultimo=res[res.length-1];
   if(atual.inicio<=ultimo.fim) ultimo.fim=Math.max(ultimo.fim,atual.fim);
   else res.push(atual);
 }
 return res;
}

function espacosLivres(dia,barb){
 var inicioDia=min(INICIO_EXPEDIENTE),fimDia=min(FIM_EXPEDIENTE);
 var ocupados=eventosOcupados(dia,barb);
 var livres=[];
 var cursor=inicioDia;

 ocupados.forEach(function(o){
   if(cursor<o.inicio) livres.push({inicio:cursor,fim:o.inicio});
   cursor=Math.max(cursor,o.fim);
 });
 if(cursor<fimDia) livres.push({inicio:cursor,fim:fimDia});
 return livres;
}

function horariosDisponiveis(dia,barb,duracao){
 var livres=espacosLivres(dia,barb);
 var horarios=[];
 livres.forEach(function(e){
   if(e.fim-e.inicio>=duracao) {
     horarios.push(hhmm(e.inicio));
   }
 });
 return horarios;
}

function horarioAindaLivre(dia,barb,inicio,duracao){
 var fim=inicio+duracao;
 return espacosLivres(dia,barb).some(function(e){return inicio>=e.inicio&&fim<=e.fim});
}

async function carregar(){
 liberarBotao(false);
 horarios.innerHTML='<div class="empty">Carregando horários...</div>';
 try{
  var dados=await Promise.all([jsonp("listar"),jsonp("barbeiros"),jsonp("servicos"),jsonp("bloqueios")]);
  ag=(dados[0]||[]).filter(function(a){return campo(a,"Cliente")}).map(mapAg);
  barbeiros=dados[1]||[];
  servicos=dados[2]||[];
  bloqueios=(dados[3]||[]).map(mapBloq);
  if(!barbeiros.length)barbeiros=["Barbeiro 1"];
  if(!servicos.length)servicos=[{servico:"Corte",valor:35,duracao:30}];
  barbeiro.innerHTML=barbeiros.map(function(b){return "<option>"+esc(b)+"</option>"}).join("");
  servico.innerHTML=servicos.map(function(s,i){return '<option value="'+i+'">'+esc(s.servico)+' — '+brl(s.valor)+' — '+parseDuracao(s.duracao)+'min</option>'}).join("");
  renderHorarios();
 }catch(e){
  horarios.innerHTML='<div class="empty">Não consegui carregar os horários.<br>Atualize a página.</div>';
  console.error(e);
 }
}

function renderHorarios(){
 liberarBotao(false);
 document.querySelectorAll(".hour").forEach(function(b){b.classList.remove("selected")});
 var dia=data.value,barb=barbeiro.value,s=servicos[Number(servico.value)]||{duracao:30};
 if(!dia||!barb){horarios.innerHTML='<div class="empty">Escolha data e barbeiro.</div>';return}
 var livres=horariosDisponiveis(dia,barb,parseDuracao(s.duracao));
 if(!livres.length){horarios.innerHTML='<div class="empty">Nenhum espaço livre para esse serviço.</div>';return}
 horarios.innerHTML=livres.map(function(h){return '<button type="button" class="hour free" data-hora="'+h+'">'+h+'</button>'}).join("");
}

async function agendar(){
 limparMsgs();
 var s=servicos[Number(servico.value)],btn=document.querySelector(".hour.selected");
 if(!nome.value.trim()||!whatsapp.value.trim()||!s||!barbeiro.value||!data.value||!btn){msg("erro","Preencha tudo e escolha um horário disponível.");return}
 var inicio=min(btn.dataset.hora),dur=parseDuracao(s.duracao);
 if(!horarioAindaLivre(data.value,barbeiro.value,inicio,dur)){msg("erro","Esse horário não está mais disponível.");renderHorarios();return}
 var payload={data:data.value,horario:btn.dataset.hora,cliente:nome.value.trim(),whatsapp:whatsapp.value.trim(),servico:s.servico,barbeiro:barbeiro.value,valor:s.valor,duracao:dur,observacao:obs.value.trim()};
 try{confirmar.disabled=true;confirmar.textContent="Enviando...";await post(payload);msg("ok","<strong>Agendamento enviado!</strong><br>"+esc(payload.cliente)+", seu horário ficou para "+esc(payload.data.split("-").reverse().join("/"))+" às "+esc(payload.horario)+".");nome.value="";whatsapp.value="";obs.value="";setTimeout(carregar,1200)}catch(e){msg("erro","Não consegui enviar.")}finally{liberarBotao(false)}
}

document.addEventListener("click",function(e){if(e.target.matches(".hour.free")){document.querySelectorAll(".hour").forEach(function(b){b.classList.remove("selected")});e.target.classList.add("selected");liberarBotao(true)}if(e.target.id==="confirmar")agendar()});
["data","barbeiro","servico"].forEach(function(id){document.getElementById(id).addEventListener("change",renderHorarios)});
data.value=hoje();carregar();
</script>
</body></html>
