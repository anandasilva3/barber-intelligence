<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Barber Intelligence v1.0.1 logo corrigida -->
<title>Jackeline Barbeira - Agendamento</title>
<style>
:root {
  --gold:#c99a4a;
  --bg:#060606;
  --card:#171717;
  --text:#fff7e8;
  --muted:#b8ae9f;
  --line:#333;
  --ok:#39b26f;
  --okbg:#123422;
  --warn:#f2b742;
  --warnbg:#392d10;
  --danger:#e05a47;
  --dangerbg:#3b1713;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:radial-gradient(circle at top,#252525,#060606 70%);
  color:var(--text);
}
header {
  padding:22px 16px;
  background:#050505;
  border-bottom:1px solid var(--line);
}
.header-inner {
  max-width:1100px;
  margin:auto;
  display:flex;
  align-items:center;
  gap:16px;
}
.logo, .logo-placeholder {
  width:82px;
  height:82px;
  border-radius:50%;
  object-fit:cover; object-position:center;
  border:2px solid var(--gold);
  background:#111;
}
.logo-placeholder {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
}
.brand {
  margin:0;
  color:var(--muted);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
}
h1 {
  margin:4px 0;
  color:var(--gold);
  font-size:26px;
}
.subtitle {
  margin:0;
  color:var(--muted);
  font-size:14px;
}
main {
  max-width:1100px;
  margin:auto;
  padding:16px;
}
.card {
  background:rgba(23,23,23,.98);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 12px 28px rgba(0,0,0,.25);
}
h2 {
  margin:0 0 14px;
  font-size:21px;
}
.row {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}
label {
  display:block;
  margin:12px 0 6px;
  color:var(--muted);
  font-size:13px;
  font-weight:bold;
}
input, select, textarea {
  width:100%;
  min-height:46px;
  padding:13px;
  border-radius:12px;
  border:1px solid #3a3a3a;
  background:#0d0d0d;
  color:var(--text);
  font-size:15px;
  outline:none;
}
textarea {
  min-height:76px;
  resize:vertical;
}
button {
  border:0;
  border-radius:13px;
  padding:12px 14px;
  min-height:45px;
  font-weight:bold;
  cursor:pointer;
}
.secondary { background:#252525; color:var(--text); }
.primary { background:var(--gold); color:#111; width:100%; margin-top:14px; }
.okbtn { background:var(--ok); color:#06180e; }
.warnbtn { background:var(--warn); color:#1d1300; }
.danger { background:var(--danger); color:white; }
.tabs {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:14px;
}
.tab {
  border:1px solid var(--line);
  border-radius:14px;
  background:#111;
  color:var(--text);
  min-height:46px;
  font-weight:bold;
}
.tab.active {
  background:var(--gold);
  color:#111;
}
section.tab-section { display:none; }
section.tab-section.active { display:block; }
.top {
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
}
.item {
  border:1px solid var(--line);
  background:#141414;
  border-radius:17px;
  padding:14px;
  margin:10px 0;
}
.item.atendido { background:var(--okbg); border-color:var(--ok); }
.item.faltou { background:var(--warnbg); border-color:var(--warn); }
.item.cancelado { background:var(--dangerbg); border-color:var(--danger); }
.item h3 {
  margin:0 0 6px;
  font-size:18px;
}
.meta {
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}
.item.atendido .meta,
.item.faltou .meta,
.item.cancelado .meta {
  color:#f5ead8;
}
.badge {
  display:inline-block;
  background:#333;
  border-radius:999px;
  padding:4px 9px;
  font-size:12px;
  font-weight:bold;
  margin-top:6px;
}
.actions {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:11px;
}
.empty {
  text-align:center;
  color:var(--muted);
  padding:18px;
  border:1px dashed #444;
  border-radius:16px;
}
.stats {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.stat {
  background:#141414;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}
.stat strong {
  display:block;
  color:var(--gold);
  font-size:24px;
  margin-top:6px;
}
.hours {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}
.hour {
  min-height:45px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#111;
  color:var(--text);
  font-weight:bold;
  cursor:pointer;
}
.hour:hover, .hour.selected {
  background:var(--gold);
  color:#111;
  border-color:var(--gold);
}
.alert {
  display:none;
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
}
.success {
  background:var(--okbg);
  border:1px solid var(--ok);
  color:#eafff2;
}
.error {
  background:var(--dangerbg);
  border:1px solid var(--danger);
  color:#ffe9e6;
}
.tiny, footer {
  color:var(--muted);
  font-size:12px;
  line-height:1.4;
}
footer {
  text-align:center;
  padding:18px 0;
}
@media(max-width:760px) {
  .row,.stats,.tabs,.actions { grid-template-columns:1fr; }
  .top { display:block; }
  .top button { width:100%; margin-top:10px; }
  .logo,.logo-placeholder { width:70px; height:70px; }
  h1 { font-size:22px; }
  .hours { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>

  <div id="ok" class="alert success"></div>
  <div id="erro" class="alert error"></div>

  <section class="card">
    <h2>Seu agendamento</h2>
    <div class="row">
      <div><label>Nome</label><input id="nome" placeholder="Seu nome"></div>
      <div><label>WhatsApp</label><input id="whatsapp" placeholder="(99) 99999-9999"></div>
      <div></div>
    </div>
    <div class="row">
      <div><label>Serviço</label><select id="servico"></select></div>
      <div><label>Barbeiro</label><select id="barbeiro"></select></div>
      <div><label>Data</label><input id="data" type="date"></div>
    </div>
    <label>Horários disponíveis</label>
    <div id="horarios" class="hours"><div class="empty">Carregando horários...</div></div>
    <label>Observação</label>
    <textarea id="obs" placeholder="Ex.: preferência de corte"></textarea>
    <button id="confirmar" class="primary" disabled>Escolha um horário</button>
    <p class="tiny">Os horários são calculados conforme a duração do serviço e os agendamentos existentes.</p>
  </section>

  <footer id="rodape">💈 Jackeline Barbeira • Agendamento online</footer>
</main>

<script>

const API = "https://script.google.com/macros/s/AKfycbxDGHaqhrBFwMfk5pLDK-QB2IVoLeHJgHzSeHo6HYlqx94RXmu5EUMFBnKtizh1VCLHzw/exec";

function hoje() {
  return new Date().toISOString().slice(0,10);
}
function normalizar(txt) {
  return String(txt || "").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}
function dinheiro(v) {
  return Number(v || 0).toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}
function esc(t) {
  return String(t == null ? "" : t)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}
function min(h) {
  const p = String(h || "00:00").slice(0,5).split(":").map(Number);
  return p[0] * 60 + p[1];
}
function hora(m) {
  return String(Math.floor(m/60)).padStart(2,"0") + ":" + String(m%60).padStart(2,"0");
}
function duracao(v) {
  const n = Number(v || 30);
  return isNaN(n) ? 30 : n;
}
function statusOcupa(status) {
  const s = normalizar(status);
  return s !== "cancelado" && s !== "faltou";
}
function diaSemanaNome(dataISO) {
  const nomes = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  const [ano, mes, dia] = dataISO.split("-").map(Number);
  const d = new Date(ano, mes - 1, dia);
  return nomes[d.getDay()];
}
function jsonp(acao) {
  return new Promise(function(resolve, reject) {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    window[cb] = function(dados) {
      delete window[cb];
      s.remove();
      resolve(dados);
    };
    s.onerror = function() {
      delete window[cb];
      s.remove();
      reject(new Error("Erro ao carregar API"));
    };
    s.src = API + "?acao=" + encodeURIComponent(acao) + "&callback=" + cb + "&t=" + Date.now();
    document.body.appendChild(s);
  });
}
async function post(payload) {
  await fetch(API, {
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload)
  });
}

let base = null;
let configuracoes = null;
let agendamentos = [];
let barbeiros = [];
let servicos = [];
let bloqueios = [];

function setBotao(ativo) {
  const b = document.getElementById("confirmar");
  b.disabled = !ativo;
  b.textContent = ativo ? "Confirmar agendamento" : "Escolha um horário";
}
function msg(id, texto) {
  const el = document.getElementById(id);
  el.innerHTML = texto;
  el.style.display = "block";
  scrollTo({top:0, behavior:"smooth"});
}
function limparMsgs() {
  document.getElementById("ok").style.display = "none";
  document.getElementById("erro").style.display = "none";
}
function aplicarConfig() {
  if (!configuracoes) return;
  document.documentElement.style.setProperty("--gold", configuracoes.corPrincipal || "#c99a4a");
  document.getElementById("brand").textContent = configuracoes.nomeEmpresa || "Jackeline Barbeira";
  document.getElementById("rodape").textContent = "💈 " + (configuracoes.nomeEmpresa || "Jackeline Barbeira") + " • Agendamento online";
}
function eventosDoDia(data, barbeiro) {
  const eventos = [];
  agendamentos.forEach(function(a) {
    if (a.data === data && a.barbeiro === barbeiro && statusOcupa(a.status)) {
      eventos.push({inicio:min(a.horario), fim:min(a.horario) + duracao(a.duracao)});
    }
  });
  bloqueios.forEach(function(b) {
    if (b.data === data && (normalizar(b.barbeiro) === "todos" || b.barbeiro === barbeiro)) {
      eventos.push({inicio:min(b.inicio), fim:min(b.fim)});
    }
  });
  eventos.sort((a,b) => a.inicio - b.inicio);
  return eventos;
}
function estaLivre(data, barbeiro, inicio, tempo) {
  const fim = inicio + tempo;
  const inicioExp = min(configuracoes.horarioInicio);
  const fimExp = min(configuracoes.horarioFim);
  if (inicio < inicioExp || fim > fimExp) return false;
  return !eventosDoDia(data, barbeiro).some(e => inicio < e.fim && fim > e.inicio);
}
function horariosDisponiveis(data, barbeiro, tempo) {
  const lista = [];
  const inicioExp = min(configuracoes.horarioInicio);
  const fimExp = min(configuracoes.horarioFim);
  const passo = Number(configuracoes.intervalo || 10);
  for (let t = inicioExp; t + tempo <= fimExp; t += passo) {
    if (estaLivre(data, barbeiro, t, tempo)) lista.push(hora(t));
  }
  return lista;
}
function renderHorarios() {
  setBotao(false);
  document.querySelectorAll(".hour").forEach(b => b.classList.remove("selected"));
  const data = document.getElementById("data").value;
  const barbeiro = document.getElementById("barbeiro").value;
  const servico = servicos[Number(document.getElementById("servico").value)];
  if (!data || !barbeiro || !servico) {
    document.getElementById("horarios").innerHTML = '<div class="empty">Escolha data, serviço e barbeiro.</div>';
    return;
  }
  const dia = diaSemanaNome(data);
  const diasAbertos = (configuracoes.diasAbertos || []).map(normalizar);
  if (!diasAbertos.includes(normalizar(dia))) {
    document.getElementById("horarios").innerHTML = '<div class="empty">A barbearia não atende nesse dia.</div>';
    return;
  }
  const horarios = horariosDisponiveis(data, barbeiro, duracao(servico.duracao));
  if (!horarios.length) {
    document.getElementById("horarios").innerHTML = '<div class="empty">Nenhum horário disponível para esse serviço.</div>';
    return;
  }
  document.getElementById("horarios").innerHTML = horarios.map(h => '<button type="button" class="hour" data-hora="' + h + '">' + h + '</button>').join("");
}
async function carregar() {
  setBotao(false);
  document.getElementById("horarios").innerHTML = '<div class="empty">Carregando horários...</div>';
  try {
    base = await jsonp("base");
    configuracoes = base.configuracoes;
    servicos = base.servicos || [];
    barbeiros = base.barbeiros || [];
    bloqueios = base.bloqueios || [];
    agendamentos = base.agendamentos || [];
    aplicarConfig();
    if (!servicos.length) servicos = [{servico:"Corte", valor:35, duracao:30}];
    if (!barbeiros.length) barbeiros = ["Barbeiro"];
    document.getElementById("servico").innerHTML = servicos.map((s,i) => '<option value="' + i + '">' + esc(s.servico) + ' — ' + dinheiro(s.valor) + ' — ' + duracao(s.duracao) + 'min</option>').join("");
    document.getElementById("barbeiro").innerHTML = barbeiros.map(b => '<option>' + esc(b) + '</option>').join("");
    renderHorarios();
  } catch(e) {
    console.error(e);
    document.getElementById("horarios").innerHTML = '<div class="empty">Erro ao carregar. Atualize a página.</div>';
  }
}
async function confirmarAgendamento() {
  limparMsgs();
  const servico = servicos[Number(document.getElementById("servico").value)];
  const botaoHora = document.querySelector(".hour.selected");
  if (!document.getElementById("nome").value.trim() || !document.getElementById("whatsapp").value.trim() || !servico || !botaoHora) {
    msg("erro", "Preencha tudo e escolha um horário.");
    return;
  }
  const data = document.getElementById("data").value;
  const barbeiro = document.getElementById("barbeiro").value;
  const inicio = min(botaoHora.dataset.hora);
  const tempo = duracao(servico.duracao);
  if (!estaLivre(data, barbeiro, inicio, tempo)) {
    msg("erro", "Esse horário acabou de ficar indisponível.");
    renderHorarios();
    return;
  }
  const payload = {
    acao:"criarAgendamento",
    data,
    horario:botaoHora.dataset.hora,
    cliente:document.getElementById("nome").value.trim(),
    whatsapp:document.getElementById("whatsapp").value.trim(),
    servico:servico.servico,
    barbeiro,
    valor:servico.valor,
    duracao:tempo,
    observacao:document.getElementById("obs").value.trim()
  };
  try {
    const b = document.getElementById("confirmar");
    b.disabled = true;
    b.textContent = "Enviando...";
    await post(payload);
    msg("ok", "<strong>Agendamento enviado!</strong><br>" + esc(payload.cliente) + ", seu horário ficou para " + esc(payload.data.split("-").reverse().join("/")) + " às " + esc(payload.horario) + ".");
    document.getElementById("nome").value = "";
    document.getElementById("whatsapp").value = "";
    document.getElementById("obs").value = "";
    setTimeout(carregar, 1200);
  } catch(e) {
    msg("erro", "Não consegui enviar.");
  } finally {
    setBotao(false);
  }
}
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("hour")) {
    document.querySelectorAll(".hour").forEach(btn => btn.classList.remove("selected"));
    e.target.classList.add("selected");
    setBotao(true);
  }
  if (e.target.id === "confirmar") confirmarAgendamento();
});
["data","barbeiro","servico"].forEach(id => document.getElementById(id).addEventListener("change", renderHorarios));
document.getElementById("data").value = hoje();
carregar();
</script>
</body>
</html>
